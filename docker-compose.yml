services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      HEMS_DATA_DIR: /data
    volumes:
      # Persistent storage: SQLite DB lives in named volume
      - hems_data:/data
      # Config comes from the project root (edit config.yaml locally, restart backend)
      - ./config.yaml:/data/config.yaml:ro
      # Live-reload backend Python code without rebuild (development)
      - ./backend:/app/backend
    ports:
      # Expose directly for dev/API access without frontend
      - "8000:8000"
    networks:
      - hems

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hems

volumes:
  hems_data:

networks:
  hems:
    driver: bridge
