services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      HEMS_DATA_DIR: /data
    volumes:
      # Persistent storage: SQLite DB + config.yaml
      - hems_data:/data
    ports:
      # Expose directly for dev/API access without frontend
      - "8000:8000"
    networks:
      - hems

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hems

volumes:
  hems_data:

networks:
  hems:
    driver: bridge
